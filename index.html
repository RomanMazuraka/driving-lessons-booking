<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving Lessons Booking</title>

<!-- FIREBASE (ONLINE DATABASE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
html,body{height:100%;background:#0f1115}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto;margin:0;color:#e6e6e6}

.header{background:#141821;padding:20px;text-align:center;border-bottom:2px solid #ff7a00;position:relative}
.header h1{margin:0;font-size:24px;color:#ff7a00}

.lang-switch{position:absolute;right:20px;top:20px}
.lang-switch button{padding:6px 10px;margin-left:6px;background:#ff7a00;color:white;border-radius:4px;border:none}

.container{
max-width:1100px;
margin:40px auto;
background:#1a1f2b;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

#studentView{
display:grid;
grid-template-columns:420px 1fr;
gap:40px;
align-items:start;
}

.form-column{max-width:420px}
.calendar-column{max-width:560px}

@media(max-width:900px){
#studentView{display:block}
.form-column,.calendar-column{max-width:100%}
}

#studentView label{display:block;margin-top:12px;font-size:14px;color:#b8b8b8}

input,select{
width:100%;
padding:14px;
margin-top:6px;
background:#0f1115;
border:1px solid #2c3445;
border-radius:6px;
color:white;
font-size:15px;
height:48px;
box-sizing:border-box;
}

button{padding:12px;border:none;border-radius:6px;font-weight:600;cursor:pointer}

.book-btn{background:#ff7a00;color:white;width:100%;margin-top:14px;font-size:16px}

.section-title{margin-top:10px;margin-bottom:16px;font-size:20px;color:#ff7a00}
.note{font-size:12px;color:#aaa;margin-top:10px}

#calendar{max-width:520px}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:10px}

.calendar-day{background:#0f1115;padding:8px;border-radius:8px;border:1px solid #2a2f3a;min-height:90px}

.calendar-day h4{margin:0 0 6px 0;font-size:12px;color:#ff7a00}

.calendar-slot{font-size:12px;padding:5px 6px;border-radius:5px;margin-bottom:4px;text-align:center}

.slot-free{background:#27ae60}
.slot-booked{background:#c0392b}

.schedule-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:10px}
.schedule-grid div{padding:6px;font-size:12px;text-align:center}
.slot{background:#222;border-radius:4px;cursor:pointer}
.slot.active{background:#27ae60}
.slot.booked{background:#c0392b}
.day{font-weight:600}

.admin-panel{margin-top:30px;padding:15px;background:#141821;border-radius:8px}
.admin-login{margin-bottom:20px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.admin-login input{height:38px;width:160px}
.admin-login button{height:38px}
.admin-login button{background:#ff7a00;margin-right:5px}

.lesson{background:#0f1115;padding:12px;border-radius:8px;margin-top:10px;border:1px solid #2a2f3a}
.confirm{background:#27ae60}
.status{margin-top:5px;font-size:14px;color:#ffb067}

</style>
</head>
<body>

<div class="header">
<h1 id="title">AUTOINSTRUKTOR ROMAN MAZURAKA</h1>
<div class="lang-switch">
<button onclick="setLang('uk')">UA</button>
<button onclick="setLang('cs')">CZ</button>
</div>
</div>

<div class="container">

<div class="admin-login">
<button type="button" id="adminBtn">Admin</button>
<input type="password" id="adminPass" placeholder="Password" style="display:none;padding:8px;margin-left:8px">
<button type="button" id="loginBtn" style="display:none">Login</button>
<button type="button" onclick="exitAdmin()" id="exitBtn" style="display:none">Exit admin</button>
</div>

<div id="studentView">

<div class="form-column">

<div class="section-title" id="bookingTitle">Запис на урок</div>

<label id="labelName">Ім'я та прізвище</label>
<input id="fullname" type="text">

<label id="labelPhone">Телефон</label>
<input id="phone" type="tel" inputmode="numeric" placeholder="777123456" pattern="[0-9]{9}" maxlength="9">

<label id="labelEmail">Email</label>
<input id="email" type="email" placeholder="name@email.com">

<label id="labelDate">Дата</label>
<input id="date" type="date" onchange="updateTimeSlots()">

<label id="labelTime">Час</label>
<select id="time"></select>

<button class="book-btn" onclick="bookLesson()" id="bookBtn">Записатись</button>

<div class="note" id="availabilityNote">Показуються тільки доступні години.</div>

</div>

<div class="calendar-column">

<div class="section-title" id="calendarTitle">Calendar</div>
<div id="calendar" class="calendar"></div>

</div>

</div>

<div id="adminView" style="display:none">

<div class="section-title">Admin schedule</div>

<div class="admin-panel">
<div id="scheduleGrid" class="schedule-grid"></div>
<div class="note">Зелений — доступно. Червоний — заброньовано.</div>
</div>

<div class="section-title" id="requestsTitle">Заявки</div>
<div id="requests"></div>

</div>

</div>

<script>

let studentView,adminView,exitBtn;
let fullnameInput,phoneInput,emailInput,dateInput,timeSelect;
let requestsDiv,scheduleGrid,calendarEl;

let db=null;

const firebaseConfig={
apiKey:"PASTE_KEY",
authDomain:"PASTE",
databaseURL:"PASTE",
projectId:"PASTE",
storageBucket:"PASTE",
messagingSenderId:"PASTE",
appId:"PASTE"
};

try{
if(firebaseConfig.apiKey!=="PASTE_KEY"){
firebase.initializeApp(firebaseConfig);
db=firebase.database();
}
}catch(e){console.warn("Firebase disabled",e)}

/* ADMIN LOGIN */

let ADMIN_PASSWORD="1234";

function adminLogin(){

const passInput=document.getElementById("adminPass");
const loginBtn=document.getElementById("loginBtn");

passInput.style.display="inline-block";
loginBtn.style.display="inline-block";

loginBtn.onclick=()=>{

const pass=passInput.value;

if(pass===ADMIN_PASSWORD){

studentView.style.display="none";
adminView.style.display="block";
exitBtn.style.display="inline-block";

passInput.style.display="none";
loginBtn.style.display="none";

buildSchedule();
render();

}else{
alert("Wrong password");
}

};

}

function exitAdmin(){
studentView.style.display="grid";
adminView.style.display="none";
exitBtn.style.display="none";
}

/* LANGUAGE */

let lang="uk";

const translations={
uk:{booking:"Запис на урок",name:"Ім'я та прізвище",phone:"Телефон",date:"Дата",time:"Час",book:"Записатись",requests:"Заявки",availabilityNote:"Показуються тільки доступні години.",calendar:"Календар"},
cs:{booking:"Rezervace jízdy",name:"Jméno a příjmení",phone:"Telefon",date:"Datum",time:"Čas",book:"Rezervovat",requests:"Žádosti",availabilityNote:"Zobrazují se pouze dostupné hodiny.",calendar:"Kalendář"}
};

function setLang(l){lang=l;applyLang();}

function applyLang(){
const t=translations[lang];

document.getElementById("bookingTitle").innerText=t.booking;
document.getElementById("labelName").innerText=t.name;
document.getElementById("labelPhone").innerText=t.phone;
document.getElementById("labelDate").innerText=t.date;
document.getElementById("labelTime").innerText=t.time;
document.getElementById("bookBtn").innerText=t.book;
document.getElementById("requestsTitle").innerText=t.requests;

document.getElementById("availabilityNote").innerText=t.availabilityNote;
document.getElementById("calendarTitle").innerText=t.calendar;

render();
buildCalendar();
}

/* DATA */

let availability={};
let requests={};

// generate time slots every 30 minutes from 07:00 to 20:00
const hours=[];
for(let h=7;h<=20;h++){
let hh=h.toString().padStart(2,'0');
hours.push(`${hh}:00`);
if(h!==20) hours.push(`${hh}:30`);
}
const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function loadData(){

if(!db){
availability=JSON.parse(localStorage.getItem("availability")||"{}");
requests=JSON.parse(localStorage.getItem("requests")||"{}");
buildSchedule();
buildCalendar();
render();
return;
}

 db.ref("availability").on("value",snap=>{
 availability=snap.val()||{};
 buildSchedule();
 buildCalendar();
 updateTimeSlots();
 });

 db.ref("requests").on("value",snap=>{
 requests=snap.val()||{};
 render();
 buildCalendar();
 updateTimeSlots();
 });

}

function isBooked(day,hour){
for(const id in requests){
const r=requests[id];
const d=(new Date(r.date).getDay()+6)%7;
if(d===day && r.time===hour && r.status!=="cancel") return true;
}
return false;
}

function buildSchedule(){
if(!scheduleGrid) return;

scheduleGrid.innerHTML="";

scheduleGrid.appendChild(document.createElement("div"));

days.forEach(d=>{
const el=document.createElement("div");
el.className="day";
el.innerText=d;
scheduleGrid.appendChild(el);
});

hours.forEach(h=>{

const hour=document.createElement("div");
hour.innerText=h;
scheduleGrid.appendChild(hour);


days.forEach((d,i)=>{

const slot=document.createElement("div");
slot.className="slot";

const key=i+"_"+h;

if(availability[key]) slot.classList.add("active");
if(isBooked(i,h)) slot.classList.add("booked");

slot.onclick=()=>{

if(isBooked(i,h)){
alert("Slot already booked");
return;
}

if(availability[key]) delete availability[key];
else availability[key]=true;

 if(db){
 db.ref("availability").set(availability);
}else{
 localStorage.setItem("availability",JSON.stringify(availability));
 buildSchedule();
 buildCalendar();
}

};

scheduleGrid.appendChild(slot);

});

});
}

function updateTimeSlots(){

if(!dateInput) return;

const date=dateInput.value;

if(!date) return;

const day=(new Date(date).getDay()+6)%7;

timeSelect.innerHTML="";

hours.forEach(h=>{

if(availability[day+"_"+h] && !isBooked(day,h)){
const opt=document.createElement("option");
opt.value=h;
opt.textContent=h;
timeSelect.appendChild(opt);
}

});

}

function bookLesson(){

const fullname=fullnameInput.value.trim();
const phone=phoneInput.value.trim();
const email=emailInput.value.trim();
if(!/^\d{9}$/.test(phone)){
alert("Telefon musí mít 9 číslic (např. 777123456)");
return;
}

if(!/^\S+@\S+\.\S+$/.test(email)){
alert("Zadejte platný email");
return;
}
const date=dateInput.value;
const time=timeSelect.value;

if(!fullname||!phone||!email||!date||!time){
alert("Fill all fields");
return;
}

const id=Date.now();

if(db){
 db.ref("requests/"+id).set({fullname,phone,email,date,time,status:"pending"});
}else{
 requests[id]={fullname,phone,email,date,time,status:"pending"};
 localStorage.setItem("requests",JSON.stringify(requests));
 render();
 buildCalendar();
}

alert("Booking request sent");

}

function confirmLesson(id){
if(db){
 db.ref("requests/"+id+"/status").set("confirmed");
}else{
 requests[id].status="confirmed";
 localStorage.setItem("requests",JSON.stringify(requests));
 render();
 buildCalendar();
}
}

function cancelLesson(id){
if(db){
 db.ref("requests/"+id+"/status").set("cancel");
}else{
 requests[id].status="cancel";
 localStorage.setItem("requests",JSON.stringify(requests));
 render();
 buildCalendar();
}
}

function render(){

if(!requestsDiv) return;

requestsDiv.innerHTML="";

for(const id in requests){

const r=requests[id];

const div=document.createElement("div");
div.className="lesson";

let html=`<b>${r.fullname}</b><br>${r.phone}<br>${r.email}<br>${r.date} ${r.time}<br><div class="status">${r.status}</div>`;

if(r.status==="pending"){
html+=`<button class="confirm" onclick="confirmLesson('${id}')">Confirm</button>
<button onclick="cancelLesson('${id}')" style="background:#c0392b">Cancel</button>`;
}

if(r.status==="confirmed"){
html+=`<button onclick="cancelLesson('${id}')" style="background:#c0392b">Cancel</button>`;
}


div.innerHTML=html;
requestsDiv.appendChild(div);

}

}

function buildCalendar(){

if(!calendarEl) return;

calendarEl.innerHTML="";

for(let d=0;d<7;d++){

const dayBox=document.createElement("div");
dayBox.className="calendar-day";

const title=document.createElement("h4");
title.innerText=days[d];

dayBox.appendChild(title);

hours.forEach(h=>{

if(availability[d+"_"+h]){

const slot=document.createElement("div");
slot.className="calendar-slot";

if(isBooked(d,h)){
slot.classList.add("slot-booked");
slot.innerText=h+" booked";
}else{
slot.classList.add("slot-free");
slot.innerText=h;
}


dayBox.appendChild(slot);

}

});

calendarEl.appendChild(dayBox);

}

}

/* INIT */

document.addEventListener("DOMContentLoaded",()=>{

studentView=document.getElementById("studentView");
adminView=document.getElementById("adminView");
exitBtn=document.getElementById("exitBtn");

fullnameInput=document.getElementById("fullname");
phoneInput=document.getElementById("phone");
emailInput=document.getElementById("email");

phoneInput.addEventListener("input",()=>{
phoneInput.value=phoneInput.value.replace(/[^0-9]/g,"");
});

dateInput=document.getElementById("date");
timeSelect=document.getElementById("time");

requestsDiv=document.getElementById("requests");
scheduleGrid=document.getElementById("scheduleGrid");
calendarEl=document.getElementById("calendar");

loadData();

const adminBtn=document.getElementById("adminBtn");
if(adminBtn){adminBtn.addEventListener("click",adminLogin)}

applyLang();

});

</script>

</body>
</html>
